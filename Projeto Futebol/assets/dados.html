<html lang="pt-br" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/dados.css">
    <title>Dados Cartão</title>
</head>
    <body>
         <header>
            <img class="logo" src="img/logo (1).png" alt="Logo">
            <nav>
                <a href="#">INÍCIO</a>
                <a class="texto-masculino" href="#">MASCULINO</a>
                <a href="#">FEMININO</a>
                <a href="#">INFANTIL</a>
            </nav>
            <a href="#">
                <img src="img/carrinho.png" alt="Carrinho de compras">
            </a>
        </header>

        <section class="banner">
    
        </section>

        <main>
            <div class="div-mae">
               <h4>
                Pagamento
               </h4>
               
               <div class="campo-preencher">
                    <form>
                        <fieldset>
                            <h3>DADOS <br>
                            CARTÃO</h3>
                            <div class="campo">
                                <label>Nome no Cartão</label>
                                <input name="Nome" type="name" required>
                            </div>

                            <div class="campo">
                                <label>CVV</label>
                                <input name="CVV" type="number" required>
                            </div>

                            <div class="campo">
                                <label>Validade</label>
                                <input name="Validade" type="date" required>
                            </div>

                             <div class="campo">
                                <label>Bandeira</label>
                                <input name="Bandeira" type="text" placeholder="Ex: VISA Mastercard" required>
                            </div>

                        </fieldset>
                    </form>
                    <a href="#" class="button">finalizar a compra</a>
               </div>
            </div>
        </main>

        <footer>
                <img src="img/logo (1).png" alt="Logo">
                <ul>
                    <li>Produtos Oficiais</li>
                    <li>Compra 100% segura</li>
                    <li>Envio para Todo o Brasil</li>
                    <li>Atendimento especializado</li>
                </ul>
                <div class="contato">
                    <p>Contate-nos</p>
                    <a href="#">contato@cupstore.com.br</a>
                </div>
                <p class="direitos">@ 2026 World Cup Store - Todos os direitos reservados.</p>
        </footer>

    </body>
</html>
